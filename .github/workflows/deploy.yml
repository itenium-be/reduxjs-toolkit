name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [redux-legacy, redux-modern]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: ${{ matrix.app }}
        run: bun run test:run

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & build legacy
        working-directory: redux-legacy
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install & build modern
        working-directory: redux-modern
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/legacy deploy/modern
          cp -r redux-legacy/dist/* deploy/legacy/
          cp -r redux-modern/dist/* deploy/modern/

      - name: Create index redirect
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redux Toolkit Examples</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
              a { display: block; margin: 10px 0; padding: 15px; background: #f0f0f0; text-decoration: none; color: #333; border-radius: 8px; }
              a:hover { background: #e0e0e0; }
            </style>
          </head>
          <body>
            <h1>Redux Examples</h1>
            <a href="./legacy/">Legacy Redux (without Toolkit)</a>
            <a href="./modern/">Modern Redux (with Toolkit)</a>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
